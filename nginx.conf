#
# nginx virtual-host configuration for fake-iis.
#
# This file is loaded by OpenResty (nginx + ngx_headers_more) and configures a
# single catch-all server block that impersonates Microsoft IIS 8.0. It spoofs
# the HTTP response headers that IIS emits, serves static decoy pages, and
# returns authentic-looking error responses for common Windows/IIS paths that
# automated scanners probe.

server {
    # ── Listeners ─────────────────────────────────────────────────────────────
    # Accept connections on port 80 over both IPv4 and IPv6.
    listen       80;
    listen  [::]:80;

    # Match every hostname / IP so fake-iis responds regardless of how the
    # attacker addresses the host.
    server_name  _;

    # ── Document root ─────────────────────────────────────────────────────────
    # Static decoy assets are served from /var/www/html (populated by the
    # Dockerfile COPY instruction).
    root  /var/www/html;
    index index.html;

    # ── Header spoofing ───────────────────────────────────────────────────────
    # Hide the real server identity and replace it with IIS 8.0 headers.
    # ngx_headers_more (bundled with OpenResty) is required for more_set_headers
    # and more_clear_headers - standard nginx add_header cannot overwrite or
    # remove headers set by the core module.

    # Suppress the default "nginx/x.y.z" Server token.
    server_tokens off;

    # Advertise Microsoft IIS 8.0 as the server software.
    more_set_headers "Server: Microsoft-IIS/8.0";

    # Mimic the ASP.NET stack headers that IIS emits on Windows/.NET sites.
    more_set_headers "X-Powered-By: ASP.NET";
    more_set_headers "X-AspNet-Version: 4.0.30319";

    # Remove the OpenResty version disclosure header added upstream.
    more_clear_headers "X-OpenResty-Version";

    # ── Decoy routes ──────────────────────────────────────────────────────────

    # Serve the fake web.config with the correct XML content-type so scanners
    # that fetch it receive a plausible response.
    location = /web.config {
        default_type text/xml;
    }

    # Return 404 for well-known IIS / Windows administrative and sample paths
    # that vulnerability scanners routinely probe.  Responding (rather than
    # dropping) keeps the connection open long enough to appear realistic.
    location ~* ^/(scripts|msadc|_vti_bin|_vti_inf|_mem_bin|iissamples|winnt|system32) {
        return 404;
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    # Map HTTP error codes to the static decoy pages that replicate the default
    # IIS 8.0 error page appearance.
    error_page 403              /403.html;
    error_page 404              /404.html;
    error_page 400 500 502 503  /500.html;

    # Mark error page locations as internal so they cannot be requested directly
    # by clients - they are only reachable via the error_page redirects above.
    location = /403.html { internal; }
    location = /404.html { internal; }
    location = /500.html { internal; }

    # ── Cache control ─────────────────────────────────────────────────────────
    # Disable caching for all dynamic-looking content types.  IIS does not cache
    # these by default, and consistent headers help maintain the deception.
    location ~* \.(html|htm|xml|config)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    # Suppress access logs entirely and route error logs to /dev/null at the
    # critical level only.  This avoids filling the host disk with scanner
    # noise while still allowing the container to surface fatal startup errors.
    access_log  off;
    error_log   /dev/null  crit;
}
